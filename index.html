<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- tailwind & daisyUI cdn -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body class="bg-base-200 flex justify-center items-center min-h-screen">
    <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl">
      <div class="card-body text-center">
        <img class="w-[60px] mx-auto" src="./assets/github-logo.png" alt="" />
        <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
        <p class="text-gray-500">Sign in to manage your issues</p>
        <fieldset class="fieldset">
          <label class="label">UserName</label>
          <input
            id="username"
            type="text"
            class="input"
            placeholder="Enter Username"
          />
          <label class="label">Password</label>
          <input
            id="password"
            type="password"
            class="input"
            placeholder="Password"
          />
          <button class="btn btn-primary mt-4">Login</button>
        </fieldset>
      </div>
    </div>
  </body>
</html>
