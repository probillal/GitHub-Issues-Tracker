<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- tailwind & daisyUI cdn -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body>
    <!-- header -->
    <header>
      <!-- Navbar -->
      <nav>
        <div class="navbar bg-base-100 shadow flex justify-between">
          <div class="flex gap-3 items-center">
            <img class="w-[30px]" src="./assets/github-logo.png" alt="" />
            <a class="text-xl font-bold">GitHub Issues Tracker</a>
          </div>
          <div class="flex gap-2">
            <div class="w-72">
              <label class="input flex items-center gap-2 rounded-xl">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input
                  id="searchInput"
                  type="text"
                  class="grow"
                  placeholder="Search issue"
                />
              </label>
            </div>
            <button class="btn btn-primary">+ New Issue</button>
          </div>
        </div>
      </nav>
    </header>
    <!-- main -->
    <main>
      <!-- Tabs section -->
      <section>
        <div class="p-4 rounded-xl mx-40 mt-6">
          <div
            class="tabs tabs-boxed p-4 w-full bg-base-100 shadow-sm border border-gray-100 rounded-lg"
          >
            <button
              id="tab-all"
              class="tab tab-active bg-[#4A00FF] px-8 rounded-md py-2 text-white ml-4"
              onclick="filterIssues('all')"
            >
              All
            </button>
            <button
              id="tab-open"
              class="tab px-8 rounded-md py-2 border border-gray-300 text-gray-500 font-semibold bg-white ml-4"
              onclick="filterIssues('open')"
            >
              Open
            </button>
            <button
              id="tab-closed"
              class="tab px-8 rounded-md py-2 border border-gray-300 text-gray-500 font-semibold bg-white ml-4"
              onclick="filterIssues('closed')"
            >
              Closed
            </button>
          </div>
        </div>
      </section>
      <!-- issue section -->
      <section>
        <div
          class="card p-4 rounded-xl mx-40 mt-6 bg-base-100 shadow-sm border border-gray-100 rounded-lg"
        >
          <div class="p-5 flex items-center justify-between w-full">
            <div class="flex items-center gap-4">
              <div
                class="w-12 h-12 rounded-full bg-purple-100 flex items-center justify-center text-purple-600"
              >
                <img src="./assets/Aperture.png" alt="" />
              </div>
              <div>
                <h2 class="text-xl font-bold text-slate-800">50 Issues</h2>
                <p class="text-sm text-slate-500">
                  Track and manage your project issues
                </p>
              </div>
            </div>
            <div class="flex items-center gap-6">
              <div class="flex items-center gap-2">
                <span class="w-3 h-3 rounded-full bg-emerald-500"></span>
                <span class="text-sm font-medium text-slate-600">Open</span>
              </div>
              <div class="flex items-center gap-2">
                <span class="w-3 h-3 rounded-full bg-purple-500"></span>
                <span class="text-sm font-medium text-slate-600">Closed</span>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script src="./js/script.js"></script>
  </body>
</html>
