<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- tailwind & daisyUI cdn -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body>
    <!-- Global Loader -->
    <div
      id="global-loader"
      class="hidden fixed inset-0 bg-white/70 backdrop-blur-sm z-[9999] flex items-center justify-center"
    >
      <div class="flex flex-col items-center">
        <span class="loading loading-spinner loading-lg text-[#5A00FF]"></span>
        <p
          class="mt-4 text-slate-500 font-bold animate-pulse text-xs uppercase tracking-widest"
        >
          Processing Data...
        </p>
      </div>
    </div>

    <!--Navbar -->
    <section>
      <div
        class="flex flex-col md:flex-row justify-between items-center px-4 md:px-20 py-4 navbar bg-base-100 shadow-sm gap-4"
      >
        <!-- Logo -->
        <div
          class="flex items-center justify-center md:justify-start w-full md:w-auto"
        >
          <img
            class="w-8 h-8 md:w-10 md:h-10"
            src="./assets/github-logo.png"
            alt="Logo"
          />
          <a class="btn btn-ghost text-lg md:text-xl px-2"
            >GitHub Issues Tracker</a
          >
        </div>

        <!-- Search + Button -->
        <div
          class="flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto"
        >
          <!-- Search Input -->
          <div class="relative w-full md:w-64">
            <span
              class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"
            >
              <i class="fa-solid fa-magnifying-glass"></i>
            </span>

            <input
              id="search-input"
              type="text"
              placeholder="Search issue"
              class="input input-bordered w-full pl-10"
            />
          </div>

          <!-- New Issue Button -->
          <div class="w-full sm:w-auto">
            <button
              id="new-issue-btn"
              class="btn btn-primary w-full sm:w-auto whitespace-nowrap"
            >
              <i class="fa-solid fa-plus"></i> New Issue
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- main section -->
    <main>
      <!-- Tabs section -->
      <section class="max-w-[1200px] mx-auto mt-10 space-y-6">
        <div class="flex gap-2 p-4 bg-white rounded-lg shadow-sm">
          <div class="tabs tabs-boxed p-4 w-full mx-auto rounded-lg">
            <button
              id="tab-all"
              class="tab tab-active bg-primary text-white"
              onclick="filterIssues('all')"
            >
              All
            </button>

            <button id="tab-open" class="tab" onclick="filterIssues('open')">
              Open
            </button>

            <button
              id="tab-closed"
              class="tab"
              onclick="filterIssues('closed')"
            >
              Closed
            </button>
          </div>
        </div>
      </section>
      <!-- issue section -->
      <section class="max-w-[1200px] mx-auto mt-10 space-y-6">
        <div
          class="flex items-center justify-between bg-white p-6 rounded-xl shadow-sm border border-gray-100 mt-5"
        >
          <div class="p-5 flex items-center justify-between w-full">
            <!-- Left -->
            <div class="flex items-center gap-4">
              <div
                class="w-12 h-12 rounded-full bg-purple-100 flex items-center justify-center text-purple-600"
              >
                <img src="./assets/Aperture.png" alt="" />
              </div>

              <div>
                <!-- Total issue  -->
                <h2 id="issue-count" class="text-xl font-bold text-slate-800">
                  0 Issues
                </h2>

                <p class="text-sm text-slate-500">
                  Track and manage your project issues
                </p>
              </div>
            </div>

            <!-- Right indicator -->
            <div class="flex items-center gap-6">
              <div class="flex items-center gap-2">
                <span class="w-3 h-3 rounded-full bg-emerald-500"></span>
                <span class="text-sm font-medium text-slate-600">Open</span>
              </div>

              <div class="flex items-center gap-2">
                <span class="w-3 h-3 rounded-full bg-purple-500"></span>
                <span class="text-sm font-medium text-slate-600">Closed</span>
              </div>
            </div>
          </div>
        </div>
      </section>
      <!-- issue card section -->
      <section>
        <div
          id="issuesContainer"
          class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 p-6"
        ></div>
      </section>
    </main>
    <script src="./js/script.js"></script>
  </body>
</html>
